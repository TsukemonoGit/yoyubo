name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

jobs:
  build-android:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter pub get
        working-directory: yoyuboo
        run: flutter pub get

      - name: Build APK (release)
        working-directory: yoyuboo
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv yoyuboo/build/app/outputs/flutter-apk/app-release.apk \
             yoyuboo/build/app/outputs/flutter-apk/yoyuboo-${{ env.RELEASE_TAG }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: yoyuboo/build/app/outputs/flutter-apk/yoyuboo-${{ env.RELEASE_TAG }}.apk
