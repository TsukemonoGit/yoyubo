<!doctype html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="A new Flutter project." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="yoyuboo" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>yoyuboo</title>
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
    <script src="flutter_bootstrap.js" async></script>
    <script>
      // IndexedDB for storing file handle
      const dbName = "YoyubooDB";
      const storeName = "fileHandles";

      async function openDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(dbName, 1);
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
              db.createObjectStore(storeName);
            }
          };
          request.onsuccess = (event) => resolve(event.target.result);
          request.onerror = (event) => reject(event.target.error);
        });
      }

      async function saveHandle(key, handle) {
        const db = await openDB();
        const transaction = db.transaction([storeName], "readwrite");
        const store = transaction.objectStore(storeName);
        store.put(handle, key);
      }

      async function getHandle(key) {
        const db = await openDB();
        const transaction = db.transaction([storeName], "readonly");
        const store = transaction.objectStore(storeName);
        return new Promise((resolve, reject) => {
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function deleteHandle(key) {
        const db = await openDB();
        const transaction = db.transaction([storeName], "readwrite");
        const store = transaction.objectStore(storeName);
        store.delete(key);
      }

      // IndexedDBにファイルハンドルが保存済みか確認
      async function hasStoredHandle() {
        try {
          const handle = await getHandle("mainFile");
          return handle !== undefined && handle !== null;
        } catch (e) {
          return false;
        }
      }

      // File System Access API: 既存ファイルを開く（読み書き可能）
      async function openFile() {
        try {
          const [handle] = await window.showOpenFilePicker({
            types: [{
              description: "JSON File",
              accept: { "application/json": [".json"] },
            }],
            multiple: false,
          });
          const granted = await handle.requestPermission({ mode: "readwrite" });
          if (granted !== "granted") {
            return "error: 読み書き権限が必要です";
          }
          await saveHandle("mainFile", handle);
          return "success";
        } catch (e) {
          if (e.name === "AbortError") {
            return "cancel";
          }
          return "error: " + e.message;
        }
      }

      // File System Access API: 新規ファイル作成
      async function createFile() {
        try {
          const handle = await window.showSaveFilePicker({
            types: [{
              description: "JSON File",
              accept: { "application/json": [".json"] },
            }],
            suggestedName: "data.json",
          });
          await saveHandle("mainFile", handle);
          return "success";
        } catch (e) {
          if (e.name === "AbortError") {
            return "cancel";
          }
          return "error: " + e.message;
        }
      }

      // File System Access API: ファイルに保存
      async function saveMainFile(content) {
        try {
          const fileHandle = await getHandle("mainFile");
          if (!fileHandle) {
            // ハンドルがない場合は新規保存ダイアログを表示
            const handle = await window.showSaveFilePicker({
              types: [{
                description: "JSON File",
                accept: { "application/json": [".json"] },
              }],
              suggestedName: "data.json",
            });
            await saveHandle("mainFile", handle);
            const writable = await handle.createWritable();
            await writable.write(content);
            await writable.close();
            return "success";
          }
          const writable = await fileHandle.createWritable();
          await writable.write(content);
          await writable.close();
          return "success";
        } catch (e) {
          return "error: " + e.message;
        }
      }

      async function loadMainFile() {
        try {
          const fileHandle = await getHandle("mainFile");
          if (!fileHandle) {
            return "error: no file";
          }
          const file = await fileHandle.getFile();
          const content = await file.text();
          return content;
        } catch (e) {
          return "error: " + e.message;
        }
      }

      async function getFileHandleName() {
        try {
          const fileHandle = await getHandle("mainFile");
          if (!fileHandle) {
            return "error: no file";
          }
          return fileHandle.name;
        } catch (e) {
          return "error: " + e.message;
        }
      }

      // 前回開いたファイルを開く
      async function restoreFile() {
        try {
          const fileHandle = await getHandle("mainFile");
          if (!fileHandle) {
            return "error: 前回開いたファイルがありません";
          }
          const granted = await fileHandle.requestPermission({ mode: "readwrite" });
          if (granted !== "granted") {
            return "error: 読み書き権限が必要です";
          }
          await saveHandle("mainFile", fileHandle);
          return "success";
        } catch (e) {
          if (e.name === "AbortError") {
            return "cancel";
          }
          return "error: " + e.message;
        }
      }

      // Expose to Dart
      window.saveMainFile = saveMainFile;
      window.loadMainFile = loadMainFile;
      window.getFileHandleName = getFileHandleName;
      window.hasStoredHandle = hasStoredHandle;
      window.openFile = openFile;
      window.createFile = createFile;
    </script>
  </body>
</html>
